<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏐 Voley Playa Villa de Aranda — Resultados</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f1f5f9; color: #1e293b; }

        header { background: linear-gradient(135deg, #0f172a, #1e3a5f); color: white; padding: 20px; text-align: center; border-bottom: 4px solid #d97706; }
        header h1 { font-size: 1.6rem; font-weight: 900; letter-spacing: 1px; color: #fbbf24; }
        header p { font-size: 0.85rem; color: #94a3b8; margin-top: 4px; }
        #ultimaActualizacion { font-size: 0.78rem; color: #fbbf24; margin-top: 6px; }
        #countdown { font-size: 0.75rem; color: #64748b; margin-top: 2px; }

        .nav-tabs { display: flex; gap: 0; background: #1e293b; overflow-x: auto; }
        .nav-tab { padding: 12px 20px; cursor: pointer; font-size: 0.88rem; font-weight: 600; color: #94a3b8; border-bottom: 3px solid transparent; white-space: nowrap; }
        .nav-tab.active { color: #fbbf24; border-bottom-color: #d97706; background: rgba(255,255,255,0.05); }
        .nav-tab:hover { color: #f8fafc; }

        .container { max-width: 1300px; margin: 0 auto; padding: 16px; }
        .tab-content { display: none; } .tab-content.active { display: block; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
        .card { background: white; border-radius: 10px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .card h3 { font-size: 1rem; color: #1e3a5f; margin-bottom: 10px; border-bottom: 2px solid #e2e8f0; padding-bottom: 6px; }

        .grupo-equipo { padding: 5px 0; border-bottom: 1px solid #f1f5f9; font-size: 0.88rem; }
        .grupo-equipo:last-child { border-bottom: none; }

        /* Clasificación — sin colores especiales */
        .tabla-clasificacion { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        .tabla-clasificacion th { background: #1e3a5f; color: white; padding: 6px 8px; text-align: center; }
        .tabla-clasificacion th:first-child { text-align: left; }
        .tabla-clasificacion td { padding: 5px 8px; text-align: center; border-bottom: 1px solid #f1f5f9; }
        .tabla-clasificacion td:first-child { text-align: left; font-weight: 600; }
        .tabla-clasificacion tr:nth-child(even) { background: #f8fafc; }
        .tabla-clasificacion tr:hover { background: #eff6ff; }

        /* Partidos */
        .seccion-header { background: #1e3a5f; color: #fbbf24; font-weight: 700; font-size: 0.9rem; padding: 8px 14px; border-radius: 8px 8px 0 0; margin-bottom: 0; }
        .sub-label { font-size: 0.75rem; font-weight: 700; color: #64748b; padding: 4px 14px; background: #f1f5f9; border-left: 3px solid #cbd5e1; margin: 4px 0; }
        .seccion-block { margin-bottom: 24px; }
        .partido-card { background: white; border-radius: 6px; padding: 8px 14px; margin-bottom: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); border-left: 4px solid #e2e8f0; display: flex; align-items: center; gap: 10px; }
        .partido-card.jugado { border-left-color: #10b981; }
        .partido-ronda { font-size: 0.7rem; color: #94a3b8; min-width: 54px; }
        .partido-equipo { flex: 1; font-size: 0.88rem; font-weight: 600; }
        .partido-equipo.away { text-align: right; }
        .partido-score { background: #1e3a5f; color: white; border-radius: 6px; padding: 3px 10px; font-weight: 700; font-size: 0.9rem; min-width: 56px; text-align: center; white-space: nowrap; }
        .partido-score.pendiente { background: #e2e8f0; color: #94a3b8; font-size: 0.75rem; }

        /* Fase Final */
        .bracket-section { margin-bottom: 20px; }
        .bracket-section-title { font-size: 0.85rem; font-weight: 700; color: #475569; margin-bottom: 8px; padding-left: 4px; border-left: 3px solid #d97706; padding-left: 8px; }
        .bracket-wrap { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 12px; align-items: flex-start; }
        .bracket-col { display: flex; flex-direction: column; gap: 10px; min-width: 190px; }
        .bracket-round-label { font-size: 0.72rem; font-weight: 700; color: #64748b; text-align: center; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .bracket-match { background: #f8fafc; border-radius: 8px; overflow: hidden; border: 1px solid #e2e8f0; }
        .bracket-match-header { background: #1e3a5f; color: #fbbf24; font-size: 0.68rem; font-weight: 700; padding: 3px 8px; }
        .bracket-match-header.final { background: #d97706; }
        .bracket-match-header.repesca { background: #c2410c; color: white; }
        .bracket-team-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 8px; font-size: 0.82rem; border-bottom: 1px solid #f1f5f9; gap: 6px; }
        .bracket-team-row:last-child { border-bottom: none; }
        .bracket-team-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .bracket-team-name.esperando { color: #94a3b8; font-style: italic; }
        .bracket-team-score { font-weight: 700; color: #1e3a5f; min-width: 20px; text-align: right; }
        .bracket-team-row.ganador { background: #f0fdf4; }
        .bracket-team-row.ganador .bracket-team-score { color: #15803d; }

        .podio { display: flex; flex-direction: column; gap: 8px; max-width: 420px; margin: 0 auto 24px; }
        .podio-fila { display: flex; align-items: center; gap: 12px; border-radius: 8px; padding: 10px 16px; }
        .podio-1 { background: #fffbeb; border: 2px solid #d97706; }
        .podio-2 { background: #f8fafc; border: 2px solid #64748b; }
        .podio-3 { background: #fff7ed; border: 2px solid #c2410c; }
        .podio-medalla { font-size: 1.5rem; }
        .podio-puesto { font-weight: 700; min-width: 32px; color: #64748b; }
        .podio-nombre { font-weight: 700; font-size: 1rem; }

        #cargando { text-align: center; padding: 60px; color: #64748b; }
        .spinner { display: inline-block; width: 36px; height: 36px; border: 3px solid #e2e8f0; border-top-color: #d97706; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 14px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .sin-datos { color: #94a3b8; padding: 30px; text-align: center; font-style: italic; }

        @media (max-width: 600px) {
            header h1 { font-size: 1.2rem; }
            .nav-tab { padding: 10px 12px; font-size: 0.78rem; }
        }
    </style>
</head>
<body>
<header>
    <div style="font-size:2rem;">🏐</div>
    <h1>Voley Playa Villa de Aranda</h1>
    <p>Resultados en tiempo real</p>
    <div id="ultimaActualizacion"></div>
    <div id="countdown"></div>
</header>

<div class="nav-tabs" id="navTabs"></div>
<div class="container">
    <div id="cargando"><div class="spinner"></div><p>Cargando resultados...</p></div>
    <div id="contenido" style="display:none;" ></div>
</div>

<script>
const JSON_URL = 'https://raw.githubusercontent.com/voley-playa-aranda/resultados-torneo/main/resultados.json';
const REFRESH_INTERVAL = 5 * 60;
let countdownSecs = REFRESH_INTERVAL;
let torneo = null;
let tabActiva = '';
let tabs = []; // lista de tabs dinámicas

// ── Carga ─────────────────────────────────────────────────────────
async function cargarDatos() {
    try {
        let res = await fetch(JSON_URL + '?t=' + Date.now());
        if (!res.ok) throw new Error('Error ' + res.status);
        let data = await res.json();
        torneo = data.torneo;
        let fecha = new Date(data.publicadoEn);
        document.getElementById('ultimaActualizacion').textContent =
            'Última actualización: ' + fecha.toLocaleDateString('es-ES') + ' ' + fecha.toLocaleTimeString('es-ES');
        countdownSecs = REFRESH_INTERVAL;
        construirTabs();
        renderTodo();
    } catch(e) {
        document.getElementById('ultimaActualizacion').textContent = '⚠️ Error: ' + e.message;
    }
}

setInterval(() => {
    countdownSecs--;
    if (countdownSecs <= 0) { countdownSecs = REFRESH_INTERVAL; cargarDatos(); }
    let m = Math.floor(countdownSecs / 60), s = countdownSecs % 60;
    document.getElementById('countdown').textContent =
        'Próxima actualización en ' + m + ':' + String(s).padStart(2,'0');
}, 1000);

// ── Construir lista de pestañas dinámicamente ─────────────────────
function construirTabs() {
    tabs = [
        { id: 'grupos',        label: '👥 Grupos',        render: renderGrupos },
        { id: 'clasificacion', label: '🏆 Clasificación', render: renderClasificacion },
        { id: 'por-grupos',    label: '📋 Partidos por grupo', render: renderPartidosPorGrupo },
        { id: 'por-campos',    label: '🏟️ Partidos por campo', render: renderPartidosPorCampo },
    ];
    // Añadir una pestaña por cada fase final activa
    let fasesDefs = [
        { key: 'oro',    label: '🥇 Fase Oro' },
        { key: 'plata',  label: '🥈 Fase Plata' },
        { key: 'bronce', label: '🥉 Fase Bronce' },
    ];
    if (torneo.faseFinalGenerada && torneo.fasesFinales) {
        fasesDefs.forEach(fd => {
            if (torneo.fasesFinales[fd.key]) {
                tabs.push({ id: 'fase-' + fd.key, label: fd.label, render: () => renderFase(fd.key) });
            }
        });
    }
    // Mantener la tab activa si sigue existiendo, si no ir a la primera
    if (!tabs.find(t => t.id === tabActiva)) tabActiva = tabs[0].id;
}

// ── Pestañas ──────────────────────────────────────────────────────
function renderTabs() {
    document.getElementById('navTabs').innerHTML = tabs.map(t =>
        '<div class="nav-tab' + (t.id === tabActiva ? ' active' : '') +
        '" onclick="switchTab(\'' + t.id + '\')">' + t.label + '</div>'
    ).join('');
}

function switchTab(id) {
    tabActiva = id;
    renderTabs();
    renderContenido();
}

// ── Render ────────────────────────────────────────────────────────
function renderTodo() {
    document.getElementById('cargando').style.display = 'none';
    document.getElementById('contenido').style.display = '';
    renderTabs();
    renderContenido();
}

function renderContenido() {
    let tab = tabs.find(t => t.id === tabActiva);
    if (!tab) return;
    document.getElementById('contenido').innerHTML = '<div id="tab-actual"></div>';
    document.getElementById('tab-actual').innerHTML = tab.render() || '';
}

// ── 1. GRUPOS ─────────────────────────────────────────────────────
function renderGrupos() {
    if (!torneo.grupos || !torneo.grupos.length) return '<p class="sin-datos">Sin grupos disponibles.</p>';
    let html = '<div class="grid">';
    torneo.grupos.forEach(g => {
        let equipos = [...g.equipos].sort((a,b) => (a.ordenSorteo||0) - (b.ordenSorteo||0));
        html += '<div class="card"><h3>' + g.nombre + '</h3>';
        equipos.forEach(eq => { html += '<div class="grupo-equipo">' + eq.name + '</div>'; });
        html += '</div>';
    });
    return html + '</div>';
}

// ── 2. CLASIFICACIÓN — por grupos, sin colores de posición ────────
function renderClasificacion() {
    if (!torneo.grupos || !torneo.grupos.length) return '<p class="sin-datos">Sin resultados aún.</p>';
    let html = '<div class="grid">';
    torneo.grupos.forEach(g => {
        let equipos = [...g.equipos].sort((a,b) => {
            let d = b.pts - a.pts; if (d) return d;
            d = b.dg - a.dg;      if (d) return d;
            d = b.gf - a.gf;      if (d) return d;
            return a.name.localeCompare(b.name);
        });
        html += '<div class="card"><h3>' + g.nombre + '</h3>' +
            '<table class="tabla-clasificacion"><thead><tr>' +
            '<th>#</th><th>Equipo</th><th>PJ</th><th>Pts</th><th>GF</th><th>GC</th><th>DG</th>' +
            '</tr></thead><tbody>';
        equipos.forEach((eq, i) => {
            html += '<tr><td>' + (i+1) + '</td><td>' + eq.name + '</td>' +
                '<td>' + (eq.pj||0) + '</td><td><strong>' + (eq.pts||0) + '</strong></td>' +
                '<td>' + (eq.gf||0) + '</td><td>' + (eq.gc||0) + '</td><td>' + (eq.dg||0) + '</td></tr>';
        });
        html += '</tbody></table></div>';
    });
    return html + '</div>';
}

// ── 3a. PARTIDOS POR GRUPO ────────────────────────────────────────
function renderPartidosPorGrupo() {
    let todos = recogerPartidos();
    if (!todos.length) return '<p class="sin-datos">Sin partidos disponibles.</p>';
    todos.sort((a,b) => a.gIdx - b.gIdx || a.ronda - b.ronda);
    let html = '';
    let grupoActual = null;
    todos.forEach(m => {
        if (m.grupo !== grupoActual) {
            if (grupoActual !== null) html += '</div>';
            html += '<div class="seccion-block"><div class="seccion-header">📌 ' + m.grupo + '</div>';
            grupoActual = m.grupo;
        }
        html += renderPartidoCard(m);
    });
    if (grupoActual !== null) html += '</div>';
    return html;
}

// ── 3b. PARTIDOS POR CAMPO ────────────────────────────────────────
function renderPartidosPorCampo() {
    let todos = recogerPartidos();
    if (!todos.length) return '<p class="sin-datos">Sin partidos disponibles.</p>';
    todos.sort((a,b) => (a.campoId||0) - (b.campoId||0) || a.ordenGlobal - b.ordenGlobal);
    let html = '';
    let campoActual = null;
    let grupoActual = null;
    todos.forEach(m => {
        let campo = torneo.campos && torneo.campos[m.campoId] ? torneo.campos[m.campoId].name : 'Campo ' + ((m.campoId||0)+1);
        if (campo !== campoActual) {
            if (campoActual !== null) html += '</div>';
            html += '<div class="seccion-block"><div class="seccion-header">🏟️ ' + campo + '</div>';
            campoActual = campo; grupoActual = null;
        }
        if (m.grupo !== grupoActual) {
            html += '<div class="sub-label">' + m.grupo + '</div>';
            grupoActual = m.grupo;
        }
        html += renderPartidoCard(m);
    });
    if (campoActual !== null) html += '</div>';
    return html;
}

function recogerPartidos() {
    let todos = [];
    if (!torneo.grupos) return todos;
    torneo.grupos.forEach((g, gIdx) => {
        if (!g.partidos) return;
        g.partidos.forEach(r => {
            r.encuentros.forEach(m => {
                todos.push({ ...m, grupo: g.nombre, gIdx, ronda: r.numRonda });
            });
        });
    });
    return todos;
}

function renderPartidoCard(m) {
    let jugado = m.golesHome !== '' && m.golesAway !== '';
    return '<div class="partido-card ' + (jugado ? 'jugado' : '') + '">' +
        '<span class="partido-ronda">R' + m.ronda + '</span>' +
        '<span class="partido-equipo">' + m.home + '</span>' +
        '<span class="partido-score ' + (jugado ? '' : 'pendiente') + '">' +
        (jugado ? m.golesHome + ' - ' + m.golesAway : 'vs') + '</span>' +
        '<span class="partido-equipo away">' + m.away + '</span>' +
        '</div>';
}

// ── 4. FASE FINAL — una por pestaña ──────────────────────────────
function renderFase(key) {
    let b = torneo.fasesFinales && torneo.fasesFinales[key];
    if (!b) return '<p class="sin-datos">No disponible.</p>';
    let html = '';

    // Tabla de clasificados
    if (b.clasificados && b.clasificados.length > 0) {
        html += '<div class="card" style="margin-bottom:20px;">' +
            '<h3>Equipos clasificados</h3>' +
            '<table class="tabla-clasificacion"><thead><tr><th>#</th><th>Equipo</th></tr></thead><tbody>';
        b.clasificados.forEach((nombre, i) => {
            html += '<tr><td>' + (i+1) + '</td><td>' + nombre + '</td></tr>';
        });
        html += '</tbody></table></div>';
    }

    // Podio
    let podio = calcularPodio(b);
    if (podio) {
        html += '<div class="podio">';
        html += '<div class="podio-fila podio-1"><span class="podio-medalla">🥇</span><span class="podio-puesto">1º</span><span class="podio-nombre">' + podio.primero + '</span></div>';
        html += '<div class="podio-fila podio-2"><span class="podio-medalla">🥈</span><span class="podio-puesto">2º</span><span class="podio-nombre">' + podio.segundo + '</span></div>';
        if (podio.tercero) html += '<div class="podio-fila podio-3"><span class="podio-medalla">🥉</span><span class="podio-puesto">3º</span><span class="podio-nombre">' + podio.tercero + '</span></div>';
        html += '</div>';
    }

    // Winners
    html += '<div class="bracket-section"><div class="bracket-section-title">Cuadro de Ganadores</div><div class="bracket-wrap">';
    (b.winners || []).forEach((ronda, rIdx) => {
        html += '<div class="bracket-col"><div class="bracket-round-label">Ronda ' + (rIdx+1) + '</div>';
        ronda.forEach((m, mIdx) => { html += renderMatch(m, 'Partido ' + (mIdx+1), false); });
        html += '</div>';
    });
    if (b.grandFinal) {
        html += '<div class="bracket-col"><div class="bracket-round-label">Gran Final</div>';
        html += renderMatch(b.grandFinal, '👑 Gran Final', true, 'final');
        html += '</div>';
    }
    html += '</div></div>';

    // 3º/4º simple
    if (b.tipo === 'simple' && b.thirdPlaceMatch) {
        html += '<div class="bracket-section"><div class="bracket-section-title">3er y 4º Puesto</div><div class="bracket-wrap"><div class="bracket-col">';
        html += renderMatch(b.thirdPlaceMatch, '🥉 3er Puesto', false, 'repesca');
        html += '</div></div></div>';
    }

    // Losers doble
    if (b.tipo === 'doble' && b.losers && b.losers.length > 0) {
        let losersConDatos = b.losers.filter(r => r.some(m => m.home || m.away));
        if (losersConDatos.length > 0) {
            html += '<div class="bracket-section"><div class="bracket-section-title">Cuadro de Repesca</div><div class="bracket-wrap">';
            b.losers.forEach((ronda, rIdx) => {
                if (!ronda.some(m => m.home || m.away)) return;
                let esUltima = rIdx === b.losers.length - 1;
                let label = esUltima ? '🥉 3er Puesto' : 'Repesca R' + (rIdx+1);
                html += '<div class="bracket-col"><div class="bracket-round-label">' + label + '</div>';
                ronda.forEach((m, mIdx) => {
                    if (!m.home && !m.away) return;
                    html += renderMatch(m, esUltima ? '3er Puesto' : 'P' + (mIdx+1), false, 'repesca');
                });
                html += '</div>';
            });
            html += '</div></div>';
        }
    }

    return html;
}

// ── Helpers ───────────────────────────────────────────────────────
function renderMatch(m, label, isFinal, tipo) {
    let sc = getScores(m);
    let hayScore = sc[0] !== '';
    let ganH = hayScore && parseInt(sc[0]) > parseInt(sc[1]);
    let ganA = hayScore && parseInt(sc[1]) > parseInt(sc[0]);
    let hCls = isFinal ? ' final' : tipo === 'repesca' ? ' repesca' : '';
    return '<div class="bracket-match">' +
        '<div class="bracket-match-header' + hCls + '">' + label + '</div>' +
        '<div class="bracket-team-row' + (ganH ? ' ganador' : '') + '">' +
            '<span class="bracket-team-name' + (!m.home ? ' esperando' : '') + '">' + (m.home || 'Esperando') + '</span>' +
            '<span class="bracket-team-score">' + sc[0] + '</span>' +
        '</div>' +
        '<div class="bracket-team-row' + (ganA ? ' ganador' : '') + '">' +
            '<span class="bracket-team-name' + (!m.away ? ' esperando' : '') + '">' + (m.away || 'Esperando') + '</span>' +
            '<span class="bracket-team-score">' + sc[1] + '</span>' +
        '</div></div>';
}

function getScores(m) {
    if (!m || !m.sets || !m.sets[0]) return ['',''];
    let h = m.sets[0].hS, a = m.sets[0].aS;
    if (h === '' || h === undefined || a === '' || a === undefined) return ['',''];
    return [h, a];
}

function calcularPodio(b) {
    let sc = getScores(b.grandFinal);
    if (sc[0] === '') return null;
    let sh = parseInt(sc[0]), sa = parseInt(sc[1]);
    if (isNaN(sh) || isNaN(sa) || sh === sa) return null;
    let primero = sh > sa ? b.grandFinal.home : b.grandFinal.away;
    let segundo = sh > sa ? b.grandFinal.away : b.grandFinal.home;
    let tercero = null;
    if (b.tipo === 'doble' && b.losers && b.losers.length > 0) {
        let ultima = b.losers[b.losers.length - 1];
        if (ultima && ultima[0]) {
            let lsc = getScores(ultima[0]);
            if (lsc[0] !== '') {
                let lh = parseInt(lsc[0]), la = parseInt(lsc[1]);
                if (!isNaN(lh) && !isNaN(la) && lh !== la)
                    tercero = lh > la ? ultima[0].away : ultima[0].home;
            }
        }
    } else if (b.thirdPlaceMatch) {
        let tsc = getScores(b.thirdPlaceMatch);
        if (tsc[0] !== '') {
            let th = parseInt(tsc[0]), ta = parseInt(tsc[1]);
            if (!isNaN(th) && !isNaN(ta) && th !== ta)
                tercero = th > ta ? b.thirdPlaceMatch.home : b.thirdPlaceMatch.away;
        }
    }
    return { primero, segundo, tercero };
}

cargarDatos();
</script>
</body>
</html>
